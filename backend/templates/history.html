<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data History</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
    }
    h1 {
    color: #2c3e50;
    }

    input[type="file"], textarea {
        width: 100%;
        margin: 10px 0;
        padding: 8px;
    }

    input[type="submit"] {
        background-color: #2c3e50;
        color: white;
        padding: 10px 20px;
        border: none;
        cursor: pointer;
        border-radius: 5px;
    }

    #result {
        margin-top: 20px;
        padding: 15px;
        background-color: #f0f0f0;
        border-radius: 5px;
    }
    table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    }

    th, td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: left;
    }

    th {
        background-color: #2c3e50;
        color: white;
    }

    tr:nth-child(even) {
        background-color: #f0f0f0;
    }
    </style>
</head>
<body>
    <table>
        
        <thead>
            <tr>
                <th>Job Description</th>
                <th>Score</th>
                <th>Matched Keywords</th>
                <th>Missing Keywords</th>
                <th>Date</th>

            </tr>
        </thead>
        
        <tbody>
            {% for result in results %}
            <tr>
                <td>{{ result.job_description }}</td>
                <td>{{ result.score }}</td>
                <td>{{ result.matched_keywords }}</td>
                <td>{{ result.missing_keywords }}</td>
                <td>{{ result.created_at }}</td>

            </tr>
            {% endfor %}
            
        </tbody>
    </table>

</body>
</html>
